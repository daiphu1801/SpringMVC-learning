# =========================================================================
# APPLICATION CONFIGURATION TEMPLATE (SAFE TO PUSH TO GIT)
# Do NOT put real production passwords, API keys, or secrets in this file!
#
# To override these settings locally, use 'application-local.properties'
# which is ignored by Git, or define system environment variables.
# =========================================================================

# ==================================================
# ORACLE DATABASE
# ==================================================
db.driver-class-name=oracle.jdbc.OracleDriver
db.url=${DB_URL:jdbc:oracle:thin:@//localhost:1521/FREE}
db.username=${DB_USERNAME:your_database_username}
db.password=${DB_PASSWORD:your_database_password}

# ==================================================
# HIKARICP CONNECTION POOL
# ==================================================
db.pool.pool-name=SpringMvcOraclePool
db.pool.minimum-idle=2
db.pool.maximum-pool-size=10
db.pool.connection-timeout=30000
db.pool.idle-timeout=600000
db.pool.max-lifetime=1800000
db.pool.initialization-fail-timeout=1

# ==================================================
# MYBATIS
# ==================================================
mybatis.mapper-locations=classpath*:mapper/**/*.xml
mybatis.type-aliases-package=com.examp.springmvc.user.infrastructure.persistence
mybatis.map-underscore-to-camel-case=true
mybatis.cache-enabled=false

# ==================================================
# SPRING MVC VIEW
# ==================================================
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# ==================================================
# CLOUDINARY CONFIG (IMAGE UPLOAD)
# ==================================================
cloudinary.cloud-name=your_cloudinary_cloud_name
cloudinary.api-key=your_cloudinary_api_key
cloudinary.api-secret=your_cloudinary_api_secret

# ==================================================
# SMTP EMAIL CONFIG
# ==================================================
mail.host=smtp.gmail.com
mail.port=587
mail.username=your_email@gmail.com
mail.password=your_app_password
mail.from=your_email@gmail.com
mail.from-name=SpringMVC Shop
# ==================================================
# VIETQR BANK CONFIG
# ==================================================
vietqr.bank-code=YOUR_BANK_CODE
vietqr.account-number=YOUR_ACCOUNT_NUMBER
vietqr.account-name=YOUR_ACCOUNT_NAME

# ==================================================
# SECURITY & SESSION CONFIG
# ==================================================
app.demo.fill.enabled=true
app.cookie.secure=false
app.session.timeout-minutes=30
