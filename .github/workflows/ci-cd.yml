name: Java CI/CD with Maven and Docker

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read
  packages: write
  issues: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Verify Code Style (Spotless)
        run: mvn spotless:check

      - name: Verify Code Quality (Checkstyle)
        run: mvn checkstyle:check

      - name: Run Unit Tests
        run: mvn test

      - name: Package WAR file
        run: mvn clean package -DskipTests

      - name: Upload WAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpringMVC-Demo-WAR
          path: target/SpringMVC-Demo.war
          retention-days: 7

  security-scan:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build local Docker Image
        run: |
          docker build -t springmvc-demo-test .

      - name: Run Application in Docker container
        run: |
          docker run -d -p 8080:8080 --name app springmvc-demo-test

      - name: Wait for application to start
        run: |
          echo "Waiting for app to start..."
          timeout 60s bash -c 'until curl -s http://localhost:8080/ > /dev/null; do echo "Waiting for Tomcat..."; sleep 2; done'
          echo "App is up and responding."

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080/'
          fail_action: false
          token: ${{ secrets.GITHUB_TOKEN }}
          artifact_name: 'zapreport'

      - name: Stop Docker container
        if: always()
        run: |
          docker stop app || true
          docker rm app || true

  deploy-docker:
    needs: [build-and-test, security-scan]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase GitHub Repository Name
        id: string
        run: |
          echo "repo_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.repo_name }}:latest
            ghcr.io/${{ steps.string.outputs.repo_name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Render Deployment Trigger (Nếu bạn chọn Render, chỉ cần thêm deploy hook)
      # - name: Trigger Render Deploy Hook
      #   run: |
      #     curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
