name: Java CI/CD with Maven and Docker

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Verify Code Style (Spotless)
        run: mvn spotless:check

      - name: Verify Code Quality (Checkstyle)
        run: mvn checkstyle:check

      - name: Run Unit Tests
        run: mvn test

      - name: Package WAR file
        run: mvn clean package -DskipTests

      - name: Upload WAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpringMVC-Demo-WAR
          path: target/SpringMVC-Demo.war
          retention-days: 7

  deploy-docker:
    needs: build-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase GitHub Repository Name
        id: string
        run: |
          echo "repo_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.repo_name }}:latest
            ghcr.io/${{ steps.string.outputs.repo_name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Render Deployment Trigger (Nếu bạn chọn Render, chỉ cần thêm deploy hook)
      # - name: Trigger Render Deploy Hook
      #   run: |
      #     curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
